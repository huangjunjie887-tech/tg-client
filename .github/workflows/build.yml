name: Build Signed EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --name "天师府TG全能营销系统" --windowed --noconsole tg_gui.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 天师府TG全能营销系统
        path: dist/天师府TG全能营销系统.exe
