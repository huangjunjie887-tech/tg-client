name: Build Signed EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller requests
    
    - name: Build EXE with manifest
      run: |
        pyinstaller --onefile --name TG营销系统 --windowed --noconsole --manifest tg_gui.manifest tg_gui.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: TG营销系统
        path: dist/TG营销系统.exe
