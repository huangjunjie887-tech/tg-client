name: Build GUI EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests pyinstaller
    
    - name: Build GUI EXE
      run: |
        pyinstaller --onefile --name TG桌面控制端 --windowed tg_gui.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: TG桌面控制端
        path: dist/TG桌面控制端.exe
